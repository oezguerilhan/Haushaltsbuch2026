<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haushaltsbuch</title>
<style>
:root{
  --bg:#000000;--card:#0a0a0a;--card2:#111111;--border:#1a1a1a;
  --accent:#FF9500;--accent2:#FFB84D;
  --income:#00C853;--expense:#FF3D3D;--muted:#555555;
  --txt:#E8E8E8;--txt2:#999999;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:17px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--card)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#shell{display:flex;height:100vh;overflow:hidden}
#nav{width:200px;min-width:200px;background:#000000;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 10px;gap:2px;z-index:10}
#main{flex:1;overflow-y:auto;padding:32px 40px}
#content{max-width:920px;margin:0 auto}

.nav-brand{padding:0 10px 20px;border-bottom:1px solid var(--border);margin-bottom:10px}
.nav-brand h1{font-family:Georgia,serif;font-size:22px;font-weight:700;letter-spacing:-.3px}
.nav-brand small{color:var(--muted);font-size:13px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border:none;background:none;color:var(--muted);font-size:16px;font-weight:500;border-radius:var(--r2);cursor:pointer;text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--card);color:var(--txt)}
.nav-btn.active{background:var(--accent);color:#0f0d0b;font-weight:600}
.nav-foot{margin-top:auto;padding:10px 10px 0;border-top:1px solid var(--border);font-size:13px;color:var(--muted);min-height:28px}

.view-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.view-head h2{font-family:Georgia,serif;font-size:34px;font-weight:700;letter-spacing:-.5px}
.view-head p{color:var(--muted);font-size:15px;margin-top:2px}
.head-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
@media(max-width:720px){.grid4{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}

.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.kpi-lbl{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-family:Georgia,serif;font-size:29px;font-weight:700}
.kpi-sub{font-size:13px;color:var(--muted);margin-top:3px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--r2);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{opacity:.85}
.btn-a{background:var(--accent);color:#0f0d0b}
.btn-g{background:var(--card2);color:var(--txt2);border:1px solid var(--border)}
.btn-d{background:#e0555522;color:var(--expense);border:1px solid #e0555533}
.btn-sm{padding:5px 10px;font-size:15px}
.btn-ic{padding:6px;border-radius:8px}

.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:8px 11px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input[type=date]{color-scheme:dark}
select option{background:var(--card)}
.fgrid{display:grid;gap:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.tgl-row{display:flex;border-radius:10px;background:var(--bg);padding:3px;gap:2px}
.tgl-btn{flex:1;padding:7px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;background:none;color:var(--muted);font-family:inherit}
.tgl-btn.ae{background:var(--expense);color:#fff}
.tgl-btn.ai{background:var(--income);color:#fff}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;border-bottom:1px solid var(--border)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:16px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:rgba(255,255,255,.02)}
.tbl-foot td{font-weight:700;background:var(--bg);border-top:2px solid var(--border)}

#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
#modal-ov.open{display:flex}
#modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:su .2s ease}
#modal-box.wide{max-width:800px}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mhead h3{font-family:Georgia,serif;font-size:19px;font-weight:700}
.mbody{padding:20px}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.tx-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s;gap:10px}
.tx-row:hover{background:rgba(255,255,255,.025)}
.tx-row:last-child{border-bottom:none}
.tx-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-inf{flex:1;min-width:0}
.tx-desc{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:13px;color:var(--muted);margin-top:1px}
.tx-amt{font-family:Georgia,serif;font-size:18px;font-weight:700;flex-shrink:0}
.tx-amt.neg{color:var(--expense)}
.tx-amt.pos{color:var(--income)}
.tx-acts{display:none;gap:4px;flex-shrink:0}
.tx-row:hover .tx-acts{display:flex}

.prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px}
.prog-f{height:100%;border-radius:3px;transition:width .4s}

.steps{display:flex;align-items:center;gap:0;margin-bottom:20px}
.stp{display:flex;align-items:center;gap:6px;font-size:15px;color:var(--muted)}
.stp-n{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.stp.done .stp-n{background:var(--income);color:#fff}
.stp.act .stp-n{background:var(--accent);color:#0f0d0b}
.stp.act{color:var(--txt)}
.stp-line{flex:1;height:1px;background:var(--border);min-width:16px}
.stp-line.done{background:var(--income)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--muted);gap:10px;font-size:16px;text-align:center}
.ei{font-size:48px;margin-bottom:4px}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{width:auto}

#fab{position:fixed;right:28px;bottom:28px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#0f0d0b;font-size:31px;line-height:1;cursor:pointer;box-shadow:0 4px 20px rgba(232,160,32,.4);z-index:50;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
#fab:hover{transform:scale(1.08)}

.mth-nav{display:flex;align-items:center;gap:8px;position:relative}
.mth-nav span{font-family:Georgia,serif;font-size:17px;font-weight:600;min-width:120px;text-align:center;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s}
.mth-nav span:hover{background:var(--card2)}
.mth-nav button{background:var(--card);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:19px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.mth-nav button:hover{background:var(--card2)}
.mth-picker{position:absolute;top:100%;right:0;margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;z-index:60;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.mth-picker-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mth-picker-hdr span{font-family:Georgia,serif;font-size:18px;font-weight:700;min-width:60px;text-align:center}
.mth-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mth-picker-grid button{padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--txt2);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.mth-picker-grid button:hover{background:var(--card2);color:var(--txt)}
.mth-picker-grid button.active{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent)}

.sec-ttl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

.sw-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.sw{width:42px;height:24px;border-radius:12px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--accent)}
.sw::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s}
.sw.on::after{left:21px}

#notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:16px;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
#notif.show{opacity:1}

.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:12px;font-weight:600}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.hl-g{color:var(--income)}
.hl-r{color:var(--expense)}
.hl-a{color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .9s linear infinite;display:inline-block}
.fade{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.tag-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600;background:var(--accent);color:#0f0d0b;margin:0 2px}
.cur-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:11px;font-weight:700;background:#3b82f622;color:#60a5fa;margin-left:4px}
.split-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.split-row input,.split-row select{flex:1}

@media print{
  #nav,#fab,#modal-ov,#notif,.nav-btn,.btn,.filter-bar,.head-actions .btn,.tx-acts{display:none!important}
  #shell{display:block!important}
  #main{padding:10px!important;overflow:visible!important}
  body{background:#fff!important;color:#000!important;font-size:15px!important}
  .card{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}
  .kpi{border:1px solid #ccc!important;background:#f9f9f9!important}
  .kpi-val,.tx-amt{color:#000!important}
  .kpi-val.hl-g,.tx-amt.pos{color:#16a34a!important}
  .kpi-val.hl-r,.tx-amt.neg{color:#dc2626!important}
  .tbl th,.tbl td{border-color:#ccc!important}
  svg text{fill:#333!important}
  svg line{stroke:#ccc!important}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
</style>
</head>

    <div class="nav-foot"></div>
  </nav>
  <main id="main"><div id="content" class="fade"></div></main>
</div>

<script>
'use strict';

// ── src/js/constants.js ─────────────────────────────────────
const CATS = [
  { id: 'wohnen', name: 'Wohnen', icon: '🏠', color: '#6366f1', type: 'expense' },
  { id: 'lebensmittel', name: 'Lebensmittel', icon: '🛒', color: '#22c55e', type: 'expense' },
  { id: 'transport', name: 'Transport', icon: '🚗', color: '#3b82f6', type: 'expense' },

  { id: 'freizeit', name: 'Freizeit', icon: '🎬', color: '#f59e0b', type: 'expense' },
  { id: 'kleidung', name: 'Kleidung', icon: '👔', color: '#8b5cf6', type: 'expense' },
  { id: 'restaurant', name: 'Restaurant', icon: '🍽️', color: '#ef4444', type: 'expense' },
  { id: 'bildung', name: 'Bildung', icon: '📚', color: '#06b6d4', type: 'expense' },
  { id: 'versicherung', name: 'Versicherungen', icon: '🛡️', color: '#64748b', type: 'expense' },
  { id: 'sparen', name: 'Sparen', icon: '💰', color: '#eab308', type: 'expense' },
  { id: 'sonstiges_a', name: 'Sonstiges', icon: '📦', color: '#6b7280', type: 'expense' },
  { id: 'gehalt', name: 'Gehalt', icon: '💼', color: '#10b981', type: 'income' },
  { id: 'sonstiges_e', name: 'Sonstige Einnahmen', icon: '💵', color: '#84cc16', type: 'income' },
];
const ACCS = [
  { id: 'girokonto', name: 'Girokonto' },
  { id: 'bar', name: 'Bar' },
  { id: 'kreditkarte', name: 'Kreditkarte' },
];
const IVLS = [
  { v: 'weekly', l: 'Wöchentlich' },
  { v: 'biweekly', l: 'Alle 2 Wochen' },
  { v: 'monthly', l: 'Monatlich' },
  { v: 'quarterly', l: 'Vierteljährlich' },
  { v: 'yearly', l: 'Jährlich' },
];
const MONTHS_S = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];
const MONTHS_L = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
const RULES = [
  { re: /rewe|edeka|lidl|aldi|penny|netto|kaufland|norma|spar\b/i, c: 'lebensmittel' },
  { re: /shell|aral|bp|esso|tankstelle|total\b|jet\b/i, c: 'transport' },
  { re: /bvg|mvv|hvv|vvs|bahn|flixbus/i, c: 'transport' },
  { re: /netflix|spotify|amazon\s?prime|disney|youtube|dazn/i, c: 'freizeit' },
  { re: /amazon|zalando|h&m\b|zara|otto\b/i, c: 'kleidung' },
  { re: /apotheke|arzt|zahnarzt|kranken/i, c: 'gesundheit' },

  { code: 'SEK', symbol: 'kr', name: 'Schwed. Krone' },
  { code: 'JPY', symbol: '¥', name: 'Jap. Yen' },
];

];

// ── src/js/db.js ────────────────────────────────────────────
let _db = null;
let _useLocalStorage = false;
function openDB() {
  if (_db) return Promise.resolve(_db);
  if (_useLocalStorage) return Promise.resolve(null);
  return new Promise((res) => {
    try {
      const r = indexedDB.open('hb3_v1', 1);
      r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
      r.onsuccess = e => { _db = e.target.result; res(_db); };
      r.onerror = () => { _useLocalStorage = true; res(null); };
    } catch {
      _useLocalStorage = true;
      res(null);
    }
  });
}
async function dbGet(k) {
  if (_useLocalStorage) {
    try { const v = localStorage.getItem('hb_' + k); return v ? JSON.parse(v) : undefined; } catch { return undefined; }
  }
  const db = await openDB();
  if (!db) { _useLocalStorage = true; return dbGet(k); }
  return new Promise((res) => {
    try {
      const r = db.transaction('kv', 'readonly').objectStore('kv').get(k);
      r.onsuccess = () => res(r.result);
      r.onerror = () => { _useLocalStorage = true; res(dbGet(k)); };
    } catch { _useLocalStorage = true; res(dbGet(k)); }
  });
}
async function dbSet(k, v) {
  if (_useLocalStorage) {
    try { localStorage.setItem('hb_' + k, JSON.stringify(v)); } catch { /* storage full */ }
    return;
  }
  const db = await openDB();
  if (!db) { _useLocalStorage = true; return dbSet(k, v); }
  return new Promise((res) => {
    try {
      const r = db.transaction('kv', 'readwrite').objectStore('kv').put(v, k);
      r.onsuccess = () => res();
      r.onerror = () => { _useLocalStorage = true; dbSet(k, v).then(res); };
    } catch { _useLocalStorage = true; dbSet(k, v).then(res); }
  });
}

// ── src/js/charts.js ────────────────────────────────────────
function svgGrouped(data, { h = 220, keys = [], colors = [], lkey = 'label' } = {}) {

const PDFJS_LOCAL = './pdf.min.js';
const PDFJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';

const DE_MONTHS = { 'januar': '01', 'februar': '02', 'märz': '03', 'april': '04', 'mai': '05', 'juni': '06', 'juli': '07', 'august': '08', 'september': '09', 'oktober': '10', 'november': '11', 'dezember': '12',
  'jan': '01', 'feb': '02', 'mär': '03', 'apr': '04', 'jun': '06', 'jul': '07', 'aug': '08', 'sep': '09', 'okt': '10', 'nov': '11', 'dez': '12' };

/**
 * Load PDF.js — try local file first (works over file://), then CDN fallback
 */
let _pdfjsReady = null;
function getPdfLib() {
  if (typeof window.pdfjsLib !== 'undefined') return Promise.resolve(window.pdfjsLib);
  if (_pdfjsReady) return _pdfjsReady;
  _pdfjsReady = new Promise((resolve, reject) => {
    function tryLoad(src, fallback) {
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => {
        if (typeof window.pdfjsLib !== 'undefined') {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.min.js';
          resolve(window.pdfjsLib);
        } else if (fallback) { tryLoad(fallback, null); }
        else { reject(new Error('PDF.js geladen, aber pdfjsLib nicht verfügbar')); }
      };
      s.onerror = () => {
        if (fallback) { tryLoad(fallback, null); }
        else { reject(new Error('PDF.js nicht verfügbar. Bitte pdf.min.js neben die HTML-Datei legen oder Internetverbindung herstellen.')); }
      };
      document.head.appendChild(s);
    }
    tryLoad(PDFJS_LOCAL, PDFJS_CDN);
  });

}

/**
 * Extract structured items from PDF with their positions
 */
async function extractPdfItems(file) {
  const lib = await getPdfLib();
  const arrayBuf = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: arrayBuf }).promise;
  const allItems = [];

  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();
    for (const item of content.items) {
      if (!item.str || !item.str.trim()) continue;
      allItems.push({
        text: item.str.trim(),
        x: Math.round(item.transform[4]),
        y: Math.round(item.transform[5]),
        page: pageNum
      });
    }
  }

  return allItems;
}

/**
 * Parse Trade Republic PDF format.
 * Date is multiline: "01\nMärz\n2026"
 * Columns: DATUM | TYP | BESCHREIBUNG | ZAHLUNGSEINGANG | ZAHLUNGSAUSGANG | SALDO
 * Amounts are in separate Ein/Ausgang columns (not +/-)
 */
function parseTradeRepublic(items) {
  const transactions = [];

  // Sort items by page, then Y descending (top first), then X ascending
  items.sort((a, b) => a.page - b.page || b.y - a.y || a.x - b.x);

  // Group items into rows by Y position (tolerance of 3px)
  const rows = [];
  let currentRow = [];
  let lastY = null;

  for (const item of items) {
    if (lastY !== null && Math.abs(item.y - lastY) > 3) {
      if (currentRow.length) rows.push({ y: lastY, items: [...currentRow] });
      currentRow = [];
    }
    currentRow.push(item);
    lastY = item.y;
  }
  if (currentRow.length) rows.push({ y: lastY, items: currentRow });

  // Parse: scan for date patterns and collect transaction data
  // Trade Republic dates are split across 3 rows: day, month name, year
  let i = 0;
  while (i < rows.length) {
    const rowText = rows[i].items.map(it => it.text).join(' ');

    // Skip header rows, footer, and non-data rows
    if (/^DATUM|^PRODUKT|^KONTOÜBER|^UMSATZÜBER|^BARMITTEL|^HINWEISE|^GELDMARKT|^TREUHAND|Trade Republic|Brunnenstr|Berlin|Geschäftsführer|Erstellt am|Sitz der|Umsatzsteuer|^Seite \d|^www\.|^AG Char/i.test(rowText)) {
      i++;
      continue;
    }

    // Try to detect a day number (1-31) at the start of a row
    const dayMatch = rows[i].items[0]?.text.match(/^(\d{1,2})$/);
    if (!dayMatch) { i++; continue; }

    const day = dayMatch[1].padStart(2, '0');

    // Next row should be month name (März, April, etc.)
    if (i + 1 >= rows.length) { i++; continue; }
    const monthRow = rows[i + 1].items.map(it => it.text).join(' ');
    const monthKey = monthRow.trim().toLowerCase().split(/\s/)[0];
    const month = DE_MONTHS[monthKey];
    if (!month) { i++; continue; }

    // Next row should be year (2026)
    if (i + 2 >= rows.length) { i++; continue; }
    const yearRow = rows[i + 2].items.map(it => it.text).join(' ');
    const yearMatch = yearRow.match(/^(20\d{2})/);
    if (!yearMatch) { i++; continue; }
    const year = yearMatch[1];
    const dateStr = `${day}.${month}.${year}`;

    // The year row often also contains: Typ, Beschreibung, amounts
    // But sometimes Typ is on the month row. Collect all items from month+year rows
    const monthItems = rows[i + 1].items;
    const yearItems = rows[i + 2].items;
    const allRowItems = [...monthItems, ...yearItems].sort((a, b) => a.x - b.x);

    // Extract amounts: look for "€" pattern numbers
    const amountRe = /^(\d{1,3}(?:\.\d{3})*,\d{2})\s*€?$/;
    let eingang = 0, ausgang = 0, saldo = 0;
    let typ = '', beschreibung = '';
    const textParts = [];
    const amounts = [];

    for (const it of allRowItems) {
      const cleaned = it.text.replace(/€/g, '').trim();
      const amtMatch = cleaned.match(/^(\d{1,3}(?:\.\d{3})*,\d{2})$/);
      if (amtMatch) {
        amounts.push({ value: parseFloat(amtMatch[1].replace(/\./g, '').replace(',', '.')), x: it.x });
      } else if (it.text !== year && it.text !== monthRow.trim().split(/\s/)[0] && !/^\d{1,2}$/.test(it.text) && it.text !== '€') {
        textParts.push(it.text);
      }
    }

    // Check if there are continuation rows (description spanning multiple lines)
    let extraIdx = i + 3;
    while (extraIdx < rows.length) {
      const nextRowItems = rows[extraIdx].items;
      const nextText = nextRowItems.map(it => it.text).join(' ');
      // Stop if we hit another day number (next transaction) or a section header
      if (/^\d{1,2}$/.test(nextRowItems[0]?.text) && extraIdx + 1 < rows.length) {
        const peekMonth = rows[extraIdx + 1]?.items.map(it => it.text).join(' ').trim().toLowerCase().split(/\s/)[0];
        if (DE_MONTHS[peekMonth]) break;
      }
      if (/^DATUM|^PRODUKT|^BARMITTEL|^HINWEISE|^GELDMARKT|Trade Republic|Brunnenstr/i.test(nextText)) break;
      // Collect text and amounts from continuation rows
      for (const it of nextRowItems) {
        const cleaned = it.text.replace(/€/g, '').trim();
        const amtMatch = cleaned.match(/^(\d{1,3}(?:\.\d{3})*,\d{2})$/);
        if (amtMatch) {
          amounts.push({ value: parseFloat(amtMatch[1].replace(/\./g, '').replace(',', '.')), x: it.x });
        } else if (it.text !== '€') {
          textParts.push(it.text);
        }
      }
      extraIdx++;
    }

    // Parse text parts: first word(s) are Typ, rest is Beschreibung
    const fullText = textParts.join(' ').trim();
    // Known Trade Republic types
    const typMatch = fullText.match(/^(Kartentransaktion|Überweisung|Handel|Bonus|Zinsen|Lastschrift|Gutschrift|Dividende)\s*/i);
    if (typMatch) {
      typ = typMatch[1];
      beschreibung = fullText.substring(typMatch[0].length).trim();
    } else {
      beschreibung = fullText;
    }

    // Amounts: typically [eingang or ausgang, saldo] or [eingang, ausgang, saldo]
    // Saldo is always the last (rightmost) amount. Eingang/Ausgang depends on position.
    if (amounts.length >= 2) {
      saldo = amounts[amounts.length - 1].value;
      // If there's exactly 2 amounts, the first is either eingang or ausgang
      // If 3, first is eingang, second is ausgang
      if (amounts.length === 3) {
        eingang = amounts[0].value;
        ausgang = amounts[1].value;
      } else {
        // 2 amounts: determine if eingang or ausgang by checking column position
        // Eingang is usually left of Ausgang. Or: if saldo > previous saldo, it's eingang
        const amt = amounts[0].value;
        // Heuristic: if typ is Überweisung/Bonus/Zinsen/Gutschrift/Dividende → likely income
        if (/überweisung|bonus|zinsen|gutschrift|dividende|incoming/i.test(fullText)) {
          eingang = amt;
        } else {
          ausgang = amt;
        }
      }
    } else if (amounts.length === 1) {
      // Only saldo, skip this row (it's likely a header or summary)
      i = extraIdx;
      continue;
    } else {
      i = extraIdx;
      continue;
    }

    const amount = eingang > 0 ? eingang : ausgang;
    const type = eingang > 0 ? 'income' : 'expense';

    if (amount > 0) {
      const desc = beschreibung || typ || 'Transaktion';
      transactions.push({
        id: uid(),
        date: parseDeDate(dateStr),
        amount,
        type,
        description: typ ? `${typ}: ${beschreibung}` : desc,
        category: guessCategory(desc) || (type === 'income' ? 'sonstiges_e' : 'sonstiges_a'),
        account: 'girokonto',
        tags: [],
        source: 'import',
        createdAt: Date.now(),
        note: 'PDF-Import (Trade Republic)',
      });
    }

    i = extraIdx;
  }

  return transactions;
}

 * Date: "DD.MM.\nYYYY" (split across 2 lines, appears twice: Buchung + Valuta)
 * Description: multi-line "SEPA Lastschrift von\nName\nVerwendungszweck/..."

  const rows = [];
  let currentRow = [], lastY = null;
  for (const item of items) {
    if (lastY !== null && Math.abs(item.y - lastY) > 3) {
      if (currentRow.length) rows.push({ y: lastY, items: [...currentRow] });
      currentRow = [];
    }
    currentRow.push(item);

  }
  if (currentRow.length) rows.push({ y: lastY, items: currentRow });

  // Scan for transaction pattern: DD.MM. at start of row
  const datePartRe = /^(\d{2}\.\d{2}\.)$/;

  const amountRe = /^([+-])\s*(\d{1,3}(?:\.\d{3})*,\d{2})$/;

  let i = 0;
  while (i < rows.length) {
    const rowText = rows[i].items.map(it => it.text).join(' ');

    // Skip page headers, footers, metadata
    if (/^Deutsche Bank|^Filiale|^Lindenallee|^Herr|^Telefon|^24h-|^Kontoauszug|^Kontoinhaber|^Auszug|^Seite|^IBAN|^Alter Saldo|^Neuer Saldo|^Buchung|^Valuta|^Vorgang|^Soll|^Haben|^0000000/i.test(rowText)) {
      i++; continue;
    }
    if (/^\s*$/.test(rowText) || rowText.length < 3) { i++; continue; }

    // Look for date pattern "DD.MM." at the leftmost position
    const firstItem = rows[i].items[0];
    if (!firstItem || !datePartRe.test(firstItem.text)) { i++; continue; }

    const datePart = firstItem.text; // "02.12."

    // Next row should contain the year "2024"
    if (i + 1 >= rows.length) { i++; continue; }
    const yearRowItems = rows[i + 1].items;
    const yearItem = yearRowItems[0];
    if (!yearItem || !yearRe.test(yearItem.text)) { i++; continue; }

    const year = yearItem.text;
    const dateStr = datePart + year; // "02.12.2024"

    // Collect the amount from the date row (rightmost items)
    // Deutsche Bank puts amount at far right: "- 29,00" or "+ 350,00"
    let amount = 0, type = 'expense';
    const allItems = [...rows[i].items, ...yearRowItems];

    // Find amount pattern in all items of these 2 rows
    for (const it of allItems) {
      const m = it.text.match(amountRe);
      if (m) {
        amount = parseFloat(m[2].replace(/\./g, '').replace(',', '.'));
        type = m[1] === '+' ? 'income' : 'expense';
      }
    }

    // Also check for standalone amounts: number after +/- on next items
    if (amount === 0) {
      for (let j = 0; j < allItems.length - 1; j++) {
        if (allItems[j].text === '-' || allItems[j].text === '+') {
          const numMatch = allItems[j + 1]?.text.match(/^(\d{1,3}(?:\.\d{3})*,\d{2})$/);
          if (numMatch) {
            amount = parseFloat(numMatch[1].replace(/\./g, '').replace(',', '.'));
            type = allItems[j].text === '+' ? 'income' : 'expense';
          }
        }
      }
    }

    // Collect description from remaining text items (skip dates, amounts, +/-)
    const descParts = [];
    const skipSet = new Set([datePart, year, '+', '-', '€']);
    for (const it of allItems) {
      if (skipSet.has(it.text)) continue;
      if (/^\d{1,3}(?:\.\d{3})*,\d{2}$/.test(it.text)) continue;
      if (datePartRe.test(it.text) || yearRe.test(it.text)) continue;
      if (amountRe.test(it.text)) continue;
      descParts.push(it.text);
    }

    // Collect continuation rows (description, Verwendungszweck, etc.)
    let extraIdx = i + 2;
    while (extraIdx < rows.length) {
      const nextItems = rows[extraIdx].items;
      const nextText = nextItems.map(it => it.text).join(' ');
      // Stop at next transaction (date pattern) or page header
      if (datePartRe.test(nextItems[0]?.text || '')) break;
      if (/^Deutsche Bank|^Auszug|^Seite|^0000000|^Alter Saldo|^Neuer Saldo|^Buchung|^Valuta/i.test(nextText)) break;

      // Check for amounts in continuation rows (sometimes amount is on a later line)
      for (const it of nextItems) {
        const m = it.text.match(amountRe);
        if (m && amount === 0) {
          amount = parseFloat(m[2].replace(/\./g, '').replace(',', '.'));
          type = m[1] === '+' ? 'income' : 'expense';
        }
      }

      // Add text (skip Gläubiger-ID, Mand-ID, RCUR etc.)
      if (!/^Gläubiger-ID|^Mand-ID|^RCUR|^OTHR|^FRST|^OOFF/i.test(nextText)) {
        for (const it of nextItems) {
          if (skipSet.has(it.text)) continue;
          if (/^\d{1,3}(?:\.\d{3})*,\d{2}$/.test(it.text)) continue;
          if (amountRe.test(it.text)) continue;
          descParts.push(it.text);
        }
      }
      extraIdx++;
    }

    if (amount > 0) {
      let desc = descParts.join(' ').trim();
      // Clean up description: remove "Verwendungszweck/ Kundenreferenz" prefix
      desc = desc.replace(/Verwendungszweck\/?\s*Kundenreferenz\s*/gi, '').trim();
      // Extract the main payee name (first line after "SEPA ... von")
      const sepaMatch = desc.match(/^SEPA\s+\w+(?:\s+\w+)?\s+(?:von|an)\s+(.+?)(?:\s+Verwendung|\s+\d)/i);
      const payee = sepaMatch ? sepaMatch[1].trim() : '';
      const shortDesc = payee || desc.split(/\s{2,}/)[0] || desc.slice(0, 60);

      transactions.push({
        id: uid(),
        date: parseDeDate(dateStr),
        amount,
        type,
        description: shortDesc,
        category: guessCategory(shortDesc) || guessCategory(desc) || (type === 'income' ? 'sonstiges_e' : 'sonstiges_a'),
        account: 'girokonto',
        tags: [],
        source: 'import',
        createdAt: Date.now(),
        note: 'PDF-Import (Deutsche Bank)',
      });
    }

    i = extraIdx;
  }

  return transactions;
}

/**
 * Generic bank statement parser fallback
 */
function parseGenericBank(items) {
  const transactions = [];
  // Group into lines by Y
  const yGroups = {};
  for (const item of items) {
    const y = Math.round(item.y);
    if (!yGroups[y]) yGroups[y] = [];
    yGroups[y].push(item);
  }
  const lines = Object.keys(yGroups).map(Number).sort((a, b) => b - a)
    .map(y => yGroups[y].sort((a, b) => a.x - b.x).map(i => i.text).join(' '));

  const dateRe = /(\d{1,2}\.\d{1,2}\.\d{2,4})/;
  const amountRe = /(-?\d{1,3}(?:\.\d{3})*,\d{2})/;

  for (const line of lines) {
    const dateMatch = line.match(dateRe);
    const amountMatch = line.match(amountRe);
    if (!dateMatch || !amountMatch) continue;

    let fullDate = dateMatch[1];
    if (/\.\d{2}$/.test(fullDate)) fullDate = fullDate.replace(/\.(\d{2})$/, '.20$1');

    const numAmount = parseFloat(amountMatch[1].replace(/\./g, '').replace(',', '.'));
    if (isNaN(numAmount) || numAmount === 0) continue;

    let desc = line.replace(dateRe, '').replace(amountRe, '').replace(/€/g, '').trim();
    if (!desc) desc = 'Transaktion';
    const type = numAmount < 0 ? 'expense' : 'income';

    transactions.push({
      id: uid(),
      date: parseDeDate(fullDate),
      amount: Math.abs(numAmount),
      type,
      description: desc,
      category: guessCategory(desc) || (type === 'income' ? 'sonstiges_e' : 'sonstiges_a'),
      account: 'girokonto',
      tags: [],
      source: 'import',
      createdAt: Date.now(),
      note: 'PDF-Import',
    });
  }

  return transactions;
}

/**
 * Main entry: parse a PDF file into transactions
 */
async function parsePdfFile(file) {
  const items = await extractPdfItems(file);
  const fullText = items.map(i => i.text).join(' ');
  // Check Deutsche Bank FIRST — its PDFs may contain Trade Republic BIC in transactions
  const isDeutscheBank = /Deutsche Bank AG/i.test(fullText);
  const isTradeRepublic = !isDeutscheBank && /trade\s*republic|TRBKDEBBXXX/i.test(fullText);

  let txs;
  if (isDeutscheBank) txs = parseDeutscheBank(items);
  else if (isTradeRepublic) txs = parseTradeRepublic(items);
  else txs = parseGenericBank(items);

  // Deduplicate
  const seen = new Set();
  txs = txs.filter(t => {
    const key = `${t.date}|${t.amount}|${t.description}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  return txs;
}

function addBudget() {

}

// Export
function exportJ() {
  const b = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const u = URL.createObjectURL(b); const a = document.createElement('a');
  a.href = u; a.download = `haushaltsbuch-${today()}.json`; a.click();
  URL.revokeObjectURL(u); notify('📤 Export gestartet');
}
function exportCSV() {
  const sep = ';';
  const hdr = ['Datum', 'Typ', 'Betrag (EUR)', 'Kategorie', 'Konto', 'Beschreibung', 'Tags', 'Notiz', 'Währung', 'Originalbetrag', 'Wechselkurs'];
  const rows = S.transactions.sort((a, b) => a.date.localeCompare(b.date)).map(t => {
    const cat = getCat(t.category); const acc = getAcc(t.account);
    return [fmtD(t.date), t.type === 'expense' ? 'Ausgabe' : 'Einnahme', String(t.amount).replace('.', ','), cat.name, acc.name, `"${(t.description || '').replace(/"/g, '""')}"`, `"${(t.tags || []).join(', ')}"`, `"${(t.note || '').replace(/"/g, '""')}"`, t.currency || 'EUR', t.originalAmount ? String(t.originalAmount).replace('.', ',') : '', t.fxRate ? String(t.fxRate).replace('.', ',') : ''].join(sep);
  });
  const csv = '\uFEFF' + [hdr.join(sep), ...rows].join('\n');
  const b = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const u = URL.createObjectURL(b); const a = document.createElement('a');
  a.href = u; a.download = `haushaltsbuch-${today()}.csv`; a.click();
  URL.revokeObjectURL(u); notify('📊 CSV exportiert');
}
function importJ(inp) {
  const f = inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d || typeof d !== 'object') { notify('❌ Ungültiges Format'); return; }
      if (d.transactions && !Array.isArray(d.transactions)) { notify('❌ Ungültige Transaktionsdaten'); return; }
      if (d.recurring && !Array.isArray(d.recurring)) { notify('❌ Ungültige Recurring-Daten'); return; }
      if (d.budgets && !Array.isArray(d.budgets)) { notify('❌ Ungültige Budget-Daten'); return; }
      S.transactions = Array.isArray(d.transactions) ? d.transactions : [];
      S.recurring = Array.isArray(d.recurring) ? d.recurring : [];
      S.budgets = Array.isArray(d.budgets) ? d.budgets : [];
      S.categories = Array.isArray(d.categories) ? d.categories : [];
      S.accounts = Array.isArray(d.accounts) ? d.accounts : [];
      S.settings = d.settings || {};
      S.lastModified = d.lastModified || Date.now();
      save(); render(); notify('✅ Daten importiert');
    } catch { notify('❌ Ungültige Datei'); }
  };
  r.readAsText(f);
}

    <div class="field"><label>Konto</label><select id="sp-acc">${getAccs().map(a => `<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
    <div style="font-weight:600;font-size:12px;color:var(--muted);margin-top:6px">AUFTEILUNG</div>
    <div id="sp-rows">${_splits.map((r, i) => `<div class="split-row">
      <select data-onchange="splitCat" data-idx="${i}" style="flex:2">${allCats().filter(c => c.type === 'expense').map(c => `<option value="${c.id}" ${r.category === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('')}</select>
      <input type="number" step="0.01" value="${r.amount}" data-oninput="splitAmt" data-idx="${i}" style="flex:1" placeholder="Betrag">
      ${_splits.length > 1 ? `<button class="btn btn-d btn-ic btn-sm" data-action="splitDelRow" data-idx="${i}">🗑</button>` : ''}
    </div>`).join('')}</div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-g btn-sm" data-action="splitAddRow">+ Kategorie</button>
      <span style="flex:1;font-size:11px;color:var(--muted)" id="sp-rest"></span>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-g" style="flex:1" data-action="closeModal">Abbrechen</button>
      <button class="btn btn-a" style="flex:1" data-action="saveSplit">Split speichern</button>
    </div>
  </div>`;
}

function reSplit() {
  document.getElementById('m-body').innerHTML = splitHtml();
}
function splitAddRow() {
  _splits.push({ category: 'sonstiges_a', amount: '' });
  reSplit();
}
function splitDelRow(idx) {
  _splits.splice(idx, 1);
  reSplit();
}
function splitSetCat(idx, value) {
  if (_splits[idx]) _splits[idx].category = value;
}
function splitSetAmt(idx, value) {
  if (_splits[idx]) _splits[idx].amount = value;
}
function saveSplit() {
  const total = parseFloat(document.getElementById('sp-total')?.value || '0');
  const dt = document.getElementById('sp-dt')?.value;
  const desc = document.getElementById('sp-desc')?.value || '';
  const acc = document.getElementById('sp-acc')?.value || 'girokonto';
  if (!total || !dt) { notify('⚠ Betrag und Datum eingeben'); return; }
  const splitSum = _splits.reduce((s, r) => s + parseFloat(r.amount || 0), 0);
  if (Math.abs(total - splitSum) > 0.01) { notify(`⚠ Split-Summe (${fmt(splitSum)}) ≠ Gesamtbetrag (${fmt(total)})`); return; }
  const groupId = 'split_' + uid();
  _splits.forEach(r => {
    if (!r.amount) return;
    S.transactions.push({ id: uid(), date: dt, amount: parseFloat(r.amount), type: 'expense', category: r.category, account: acc, description: desc, note: 'Split-Buchung', tags: [], source: 'manual', createdAt: Date.now(), splitGroupId: groupId });
  });
  save(); closeModal(); render(); notify(`✅ ${_splits.length} Split-Buchungen erstellt`);
}
window.openSplitForm = openSplitForm;
window.splitAddRow = splitAddRow;
window.splitDelRow = splitDelRow;
window.splitSetCat = splitSetCat;
window.splitSetAmt = splitSetAmt;
window.saveSplit = saveSplit;
})();

// ── src/js/router.js ────────────────────────────────────────
let _view = 'dash';
let _month = curYM();
let _pickerYear = null; // year shown in the month picker
function navigate(v) {
  _view = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  render();
}
function render() {
  const el = document.getElementById('content');
  el.className = 'fade';
  switch (_view) {
    case 'dash': el.innerHTML = vDash(_month); break;
    case 'tx': el.innerHTML = vTx(_month); break;
    case 'rec': el.innerHTML = vRec(); break;
    case 'charts': el.innerHTML = vCharts(_month); break;
    case 'import': el.innerHTML = vImport(); break;
    case 'settings': el.innerHTML = vSettings(); break;
    default: el.innerHTML = vDash(_month);
  }
}
function prevMonth() {
  const [y, m] = _month.split('-').map(Number);
  const d = new Date(y, m - 2, 1);
  _month = `${d.getFullYear()}-${_pad2(d.getMonth() + 1)}`;
  render();
}
function nextMonth() {
  const [y, m] = _month.split('-').map(Number);
  const d = new Date(y, m, 1);
  _month = `${d.getFullYear()}-${_pad2(d.getMonth() + 1)}`;
  render();
}
function setMonth(m) { _month = m; }
function mthNav() {
  const [y, m] = _month.split('-').map(Number);
  return `<div class="mth-nav"><button data-action="prevMonth">‹</button><span data-action="openMonthPicker">${MONTHS_L[m - 1]} ${y}</span><button data-action="nextMonth">›</button></div>`;
}

// Month Picker
function openMonthPicker() {
  // Close if already open
  const existing = document.querySelector('.mth-picker');
  if (existing) { existing.remove(); return; }

  const [y] = _month.split('-').map(Number);
  _pickerYear = y;
  renderPicker();
}

function renderPicker() {
  // Remove old picker
  const old = document.querySelector('.mth-picker');
  if (old) old.remove();

  const [, curM] = _month.split('-').map(Number);
  const nav = document.querySelector('.mth-nav');
  if (!nav) return;

  const html = `<div class="mth-picker">
    <div class="mth-picker-hdr">
      <button data-action="pickerPrevYear" class="btn btn-g btn-ic btn-sm">‹</button>
      <span>${_pickerYear}</span>
      <button data-action="pickerNextYear" class="btn btn-g btn-ic btn-sm">›</button>
    </div>
    <div class="mth-picker-grid">
      ${MONTHS_S.map((name, i) => {
        const isActive = _pickerYear === parseInt(_month.split('-')[0]) && (i + 1) === curM;
        return `<button data-action="pickMonth" data-ym="${_pickerYear}-${_pad2(i + 1)}" class="${isActive ? 'active' : ''}">${name}</button>`;
      }).join('')}
    </div>
  </div>`;

  nav.insertAdjacentHTML('beforeend', html);

  // Close picker on outside click (delayed to avoid immediate close)
  setTimeout(() => {
    const handler = (e) => {
      if (!e.target.closest('.mth-picker') && !e.target.closest('[data-action="openMonthPicker"]')) {
        const p = document.querySelector('.mth-picker');
        if (p) p.remove();
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('click', handler);
  }, 10);
}
function pickerPrevYear() {
  _pickerYear--;
  renderPicker();
}
function pickerNextYear() {
  _pickerYear++;
  renderPicker();
}
function pickMonth(ym) {
  _month = ym;
  const p = document.querySelector('.mth-picker');
  if (p) p.remove();
  render();
}

// ── src/js/app.js ───────────────────────────────────────────
// ── INIT ──────────────────────────────────────────────────────────
initModal();
document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => navigate(btn.dataset.view)));
document.getElementById('fab').onclick = () => openTxForm();

// ── EVENT DELEGATION: CLICK ───────────────────────────────────────
const clickHandlers = {
  // Navigation
  prevMonth, nextMonth, closeModal, printPage: () => window.print(),
  openMonthPicker, pickerPrevYear, pickerNextYear,
  pickMonth: (el) => pickMonth(el.dataset.ym),
  // Transactions
  openTxForm: () => openTxForm(), saveTx: (el) => saveTx(el.dataset.id || ''),
  editTx: (el) => editTx(el.dataset.id), delTx: (el) => delTx(el.dataset.id),
  txTypeExpense: () => setTxType('expense'), txTypeIncome: () => setTxType('income'),
  // Batch
  openBatch, saveBatch, batchAddRow,
  batchDelRow: (el) => batchDelRow(parseInt(el.dataset.idx)),
  // Split
  openSplitForm, saveSplit, splitAddRow,
  splitDelRow: (el) => splitDelRow(parseInt(el.dataset.idx)),
  // Recurring
  openRecForm: (el) => openRecForm(el.dataset.id || null),
  saveRec: (el) => saveRec(el.dataset.id || ''),
  toggleRec: (el) => toggleRec(el.dataset.id),
  delRec: (el) => delRec(el.dataset.id),
  recTypeExpense: () => setRecType('expense'), recTypeIncome: () => setRecType('income'),
  // Charts
  setChartTab: (el) => { setChartTab(el.dataset.tab); render(); },
  chartYearPrev: () => { setChartYear(_cyr - 1); render(); },
  chartYearNext: () => { setChartYear(_cyr + 1); render(); },
  // Settings
  addBudget, delBudget: (el) => delBudget(el.dataset.id),
  exportJ, exportCSV,
  openCatForm: (el) => openCatForm(el.dataset.id || null),
  saveCat: (el) => saveCat(el.dataset.id || ''),
  delCat: (el) => delCat(el.dataset.id),
  catTypeExpense: () => setCatType('expense'), catTypeIncome: () => setCatType('income'),
  selectCatColor: (el) => selectCatColor(el.dataset.color),
  openAccForm: (el) => openAccForm(el.dataset.id || null),
  saveAcc: (el) => saveAcc(el.dataset.id || ''),
  delAcc: (el) => delAcc(el.dataset.id),
  // CSV Import
  csvPrev: csvPreview, csvBack: csvGoBack, csvBackToMap: csvGoBackToMap,
  csvImport, csvRestart, pdfImport,
};

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (clickHandlers[action]) {
    e.preventDefault();
    clickHandlers[action](btn);
  }
});

// ── EVENT DELEGATION: INPUT / CHANGE ──────────────────────────────
const changeHandlers = {
  filterTx: () => filterTx(_month),
  txCurrencyChange,
  csvLoad: (el) => csvLoad(el),
  pdfLoad: (el) => pdfLoad(el),
  importJ: (el) => importJ(el),
  csvMapCol: (el) => csvMapCol(el.dataset.col, el.value),
  batchField: (el) => batchSetField(parseInt(el.dataset.idx), el.dataset.field, el.value),
  batchType: (el) => batchSetType(parseInt(el.dataset.idx), el.value),
  splitCat: (el) => splitSetCat(parseInt(el.dataset.idx), el.value),
  splitAmt: (el) => splitSetAmt(parseInt(el.dataset.idx), el.value),
};

document.addEventListener('input', e => {
  const el = e.target.closest('[data-oninput]');
  if (el && changeHandlers[el.dataset.oninput]) changeHandlers[el.dataset.oninput](el);
});

document.addEventListener('change', e => {
  const el = e.target.closest('[data-onchange]');
  if (el && changeHandlers[el.dataset.onchange]) changeHandlers[el.dataset.onchange](el);
});

// ── BOOT ──────────────────────────────────────────────────────────
loadState().then(() => render());
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
